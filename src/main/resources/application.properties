spring.application.name=finance-app

# Server configuration
server.port=8080

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/finance_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10

# Flyway - disabled (no migration scripts)
spring.flyway.enabled=false

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=86400000

# DeepSeek API
app.deepseek.api-key=${APP_DEEPSEEK_API_KEY}
app.deepseek.base-url=https://api.deepseek.com
